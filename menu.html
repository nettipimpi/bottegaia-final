<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Menù - Bottegaia</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* FONT */
    @font-face {
      font-family: "Gordita";
      src: url("fonts/gordita-regular.woff") format("woff");
      font-weight: 400;
    }

    @font-face {
      font-family: "Champagne";
      src: url("fonts/champagne-bold.woff2") format("woff2");
      font-weight: 700;
    }

    @font-face {
      font-family: "Gordita";
      src: url("fonts/gordita-bold.woff") format("woff");
      font-weight: 700;
    }

    @font-face {
      font-family: "Gordita";
      src: url("fonts/Gordita-Light.woff2") format("woff2");
      font-weight: 300;
    }

    @font-face {
      font-family: "Gordita";
      src: url("fonts/Gordita-Medium.woff2") format("woff2");
      font-weight: 500;
    }

    @font-face {
      font-family: "NeueMontreal";
      src: url("fonts/Neue Montreal Medium 500.woff2") format("woff2");
      font-weight: 500;
    }

    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Gordita", Arial, sans-serif;
      background: #efe2d4;
      color: #822e1b;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* PAGE */
    .menu-page {
      position: relative;
      min-height: 100vh;
      background-image: url("images/tortelli.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      padding: 42px 56px 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* TOP BAR */
    .menu-top-left,
    .menu-top-right {
      position: absolute;
      top: 50px;
      z-index: 4;
    }

    .menu-top-left {
      left: 56px;
    }

    .menu-top-right {
      right: 56px;
    }

    .menu-home-link {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "NeueMontreal", Arial, sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #822e1b;
      transition: letter-spacing 0.25s ease, opacity 0.25s ease;
    }

    .menu-home-link i {
      font-size: 14px;
    }

    .menu-home-link:hover {
      letter-spacing: 0.22em;
      opacity: 0.7;
    }

    .menu-logo {
      width: 185px;
    }

    /* CONTENT */
    .menu-content {
      width: 100%;
      max-width: 1220px;
      margin: 0 auto;
      text-align: center;
    }

    .menu-title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #822e1b;
      margin-bottom: 200px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 56px;
      align-items: start;
      justify-items: center;
    }

    .menu-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.28s ease;
    }

    .menu-card:hover {
      transform: translateY(-4px);
    }

    .menu-card-image-wrap {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 44px;
      transition: transform 0.28s ease, filter 0.28s ease;
    }

    .menu-card:hover .menu-card-image-wrap {
      transform: scale(1.03);
      filter: brightness(1.02);
    }

    .menu-card-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .menu-card-label {
      position: relative;
      display: inline-block;
      font-family: "Champagne", Arial, sans-serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #822e1b;
      padding-bottom: 10px;
      transition: letter-spacing 0.28s ease, color 0.28s ease, transform 0.28s ease;
    }

    .menu-card-label::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 0;
      height: 2px;
      background: #822e1b;
      transform: translateX(-50%);
      transition: width 0.28s ease;
      opacity: 0.9;
    }

    .menu-card:hover .menu-card-label {
      letter-spacing: 0.24em;
      transform: translateY(-1px);
      color: #6f2717;
    }

    .menu-card:hover .menu-card-label::after {
      width: 72%;
    }

    /* BOTTOM ICONS */
    .menu-bottom-icons {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 54px;
      z-index: 4;
    }

    .menu-bottom-icons a {
      color: #822e1b;
      font-size: 38px;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .menu-bottom-icons a:hover {
      transform: translateY(-3px);
      opacity: 0.72;
    }

    /* SCROLL TO TOP */
    #scrollTopBtn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #822e1b;
      background: rgba(246, 234, 223, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.95);
      transition: all 0.3s ease;
      z-index: 9999;
    }

    #scrollTopBtn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    #scrollTopBtn:hover {
      transform: translateY(-3px) scale(1.05);
      background: rgba(246, 234, 223, 0.25);
    }

    /* RESPONSIVE */
    @media (max-width: 1100px) {
      .menu-grid {
        gap: 34px;
      }

      .menu-card-image-wrap {
        width: 190px;
        height: 190px;
      }

      .menu-card-label {
        font-size: 24px;
      }
    }

    @media (max-width: 900px) {
      .menu-page {
        padding: 32px 28px 110px;
      }

      .menu-top-left {
        left: 28px;
      }

      .menu-top-right {
        right: 28px;
      }

      .menu-logo {
        width: 145px;
      }

      .menu-home-link {
        font-size: 13px;
      }

      .menu-title {
        font-size: 22px;
        margin-bottom: 42px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .menu-card-image-wrap {
        width: 180px;
        height: 180px;
        margin-bottom: 20px;
      }

      .menu-card-label {
        font-size: 22px;
      }

      .menu-bottom-icons {
        gap: 34px;
      }

      .menu-bottom-icons a {
        font-size: 30px;
      }
    }

    @media (max-width: 600px) {
      .menu-page {
        padding: 24px 20px 100px;
      }

      .menu-top-left {
        left: 20px;
        top: 24px;
      }

      .menu-top-right {
        right: 20px;
        top: 24px;
      }

      .menu-logo {
        width: 120px;
      }

      .menu-home-link {
        font-size: 12px;
        letter-spacing: 0.1em;
      }

      .menu-title {
        font-size: 18px;
        margin-bottom: 34px;
        margin-top: 40px;
      }

      .menu-card-image-wrap {
        width: 150px;
        height: 150px;
      }

      .menu-card-label {
        font-size: 19px;
        letter-spacing: 0.12em;
      }

      .menu-bottom-icons {
        bottom: 24px;
        gap: 26px;
      }

      .menu-bottom-icons a {
        font-size: 26px;
      }

      #scrollTopBtn {
        bottom: 22px;
        right: 22px;
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>

  <section class="menu-page">

    <div class="menu-top-left">
      <a href="index.html">
        <img src="images/logolato.png" alt="Bottegaia" class="menu-logo">
      </a>
    </div>

    <div class="menu-top-right">
      <a href="index.html" class="menu-home-link" data-key="menu_home_link">
        <i class="fa-solid fa-arrow-right"></i>
        HOME
      </a>
    </div>

    <div class="menu-content">
      <h1 class="menu-title" data-key="menu_title">LE NOSTRE PROPOSTE</h1>

      <div class="menu-grid">

        <a href="menu-cucina.html" class="menu-card">
          <div class="menu-card-image-wrap">
            <img src="images/CUCINA.png" alt="Cucina" class="menu-card-image">
          </div>
          <span class="menu-card-label" data-key="menu_card_kitchen">CUCINA</span>
        </a>

        <a href="menu-vini.html" class="menu-card">
          <div class="menu-card-image-wrap">
            <img src="images/VINI.png" alt="Carta dei vini" class="menu-card-image">
          </div>
          <span class="menu-card-label" data-key="menu_card_wines">CARTA DEI VINI</span>
        </a>

        <a href="menu-drink.html" class="menu-card">
          <div class="menu-card-image-wrap">
            <img src="images/DRINK.png" alt="Drink" class="menu-card-image">
          </div>
          <span class="menu-card-label" data-key="menu_card_drinks">DRINK</span>
        </a>

      </div>
    </div>

    <div class="menu-bottom-icons">
      <a href="https://www.google.com/maps/place/Botte+Gaia/@44.694671,10.631719,17z" target="_blank" aria-label="Maps">
        <i class="fa-solid fa-location-dot"></i>
      </a>

      <a href="https://www.instagram.com/bottegaia.re" target="_blank" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="https://wa.me/393478126475?text=Ciao%20ragazzi%2C%20vorrei%20avere%20informazioni%20sui%20vostri%20men%C3%B9." target="_blank" aria-label="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
    </div>

  </section>

  <!-- SCROLL TO TOP -->
  <button id="scrollTopBtn" aria-label="Torna su">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script>
    const scrollBtn = document.getElementById("scrollTopBtn");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        scrollBtn.classList.add("show");
      } else {
        scrollBtn.classList.remove("show");
      }
    });

    scrollBtn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });

    const translations = {
      it: {
        menu_home_link: "HOME",
        menu_title: "LE NOSTRE PROPOSTE",
        menu_card_kitchen: "CUCINA",
        menu_card_wines: "CARTA DEI VINI",
        menu_card_drinks: "DRINK"
      },
      en: {
        menu_home_link: "HOME",
        menu_title: "OUR SELECTIONS",
        menu_card_kitchen: "KITCHEN",
        menu_card_wines: "WINE LIST",
        menu_card_drinks: "DRINKS"
      }
    };

    function applyLanguage() {
      const currentLang = localStorage.getItem("siteLanguage") || "it";
      document.documentElement.lang = currentLang;

      document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.getAttribute("data-key");
        if (translations[currentLang] && translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
    }

    applyLanguage();
  </script>

</body>
</html>
